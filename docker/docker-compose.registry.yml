name: archive-system

services:
  postgres:
    image: postgres:16-alpine
    container_name: archive-postgres
    environment:
      POSTGRES_DB: archive_system
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in docker/.env.registry}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/init-db/02-schema-consolidated.sql:/docker-entrypoint-initdb.d/02-schema-consolidated.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - archive-network

  redis:
    image: redis:7-alpine
    container_name: archive-redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - archive-network

  minio:
    image: minio/minio:latest
    container_name: archive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in docker/.env.registry}
    ports:
      - "127.0.0.1:9003:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - archive-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: archive-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in docker/.env.registry}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - archive-network

  elasticsearch:
    image: ${REGISTRY_PULL:-hub.albertzhan.top}/law-firm-archive/elasticsearch:${APP_VERSION:-latest}
    pull_policy: always
    container_name: archive-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - "ES_JAVA_OPTS=-Xms${ES_HEAP_MB:-192}m -Xmx${ES_HEAP_MB:-192}m"
      - cluster.name=archive-cluster
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - archive-network

  backend:
    image: ${REGISTRY_PULL:-hub.albertzhan.top}/law-firm-archive/backend:${APP_VERSION:-latest}
    pull_policy: always
    container_name: archive-backend
    environment:
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxGCPauseMillis=200}
      SPRING_PROFILES_ACTIVE: docker
      APP_VERSION: ${APP_VERSION:-latest}
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
      # 镜像仓库更新检查（与仓库摘要比对，可选）
      RUNNING_BACKEND_DIGEST: ${RUNNING_BACKEND_DIGEST:-}
      RUNNING_FRONTEND_DIGEST: ${RUNNING_FRONTEND_DIGEST:-}
      REGISTRY_USERNAME: ${REGISTRY_USERNAME:-}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: http://localhost:3001,http://192.168.50.10:3001,https://arc.albertzhan.top,${EXTERNAL_ORIGIN:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/archive_system
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in docker/.env.registry}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in docker/.env.registry}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in docker/.env.registry}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in docker/.env.registry}
      MINIO_PROXY_PREFIX: ${MINIO_PROXY_PREFIX:-/storage}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
    ports:
      - "127.0.0.1:8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - archive-network

  frontend:
    image: ${REGISTRY_PULL:-hub.albertzhan.top}/law-firm-archive/frontend:${APP_VERSION:-latest}
    pull_policy: always
    container_name: archive-frontend
    ports:
      - "3001:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - archive-network

volumes:
  postgres-data:
  redis-data:
  minio-data:
  rabbitmq-data:
  es-data:

networks:
  archive-network:
    driver: bridge
