# Nginx 负载均衡配置
# 用于主从服务器部署方案
# 将此配置添加到 Nginx 主配置文件中，或作为独立配置文件

upstream backend_servers {
    # 主服务器（权重更高）
    server 192.168.50.10:8080 weight=2 max_fails=3 fail_timeout=30s;
    # 从服务器
    server 192.168.50.11:8080 weight=1 max_fails=3 fail_timeout=30s backup;
    
    # 保持连接池
    keepalive 32;
}

upstream frontend_servers {
    # 主服务器（权重更高）
    server 192.168.50.10:80 weight=2 max_fails=3 fail_timeout=30s;
    # 从服务器
    server 192.168.50.11:80 weight=1 max_fails=3 fail_timeout=30s backup;
    
    # 保持连接池
    keepalive 32;
}

server {
    listen 80;
    server_name law-firm.example.com;  # 请修改为实际域名

    # 日志配置
    access_log /var/log/nginx/law-firm-access.log;
    error_log /var/log/nginx/law-firm-error.log;

    # 前端服务
    location / {
        proxy_pass http://frontend_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://backend_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # MinIO 代理（如果需要）
    location /minio/ {
        proxy_pass http://192.168.50.10:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MinIO Console 代理（如果需要）
    location /minio-console/ {
        proxy_pass http://192.168.50.10:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS 配置（如果使用 SSL）
server {
    listen 443 ssl http2;
    server_name law-firm.example.com;  # 请修改为实际域名

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 日志配置
    access_log /var/log/nginx/law-firm-ssl-access.log;
    error_log /var/log/nginx/law-firm-ssl-error.log;

    # 前端服务
    location / {
        proxy_pass http://frontend_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://backend_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
}
