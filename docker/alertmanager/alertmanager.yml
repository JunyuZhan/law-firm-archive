# Alertmanager 配置文件
# 智慧律所管理系统告警通知配置
#
# 注意：邮件配置通过系统管理模块的前端界面配置，存储在数据库中
# Alertmanager 通过 Webhook 调用后端 API 发送通知
# 后端会从数据库读取邮件配置进行发送

global:
  # 解析超时
  resolve_timeout: 5m

# 路由配置
route:
  # 默认接收者
  receiver: 'backend-webhook'
  
  # 分组等待时间
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  
  # 分组标签
  group_by: ['alertname', 'severity']
  
  # 子路由
  routes:
    # 严重告警 - 立即通知
    - match:
        severity: critical
      receiver: 'backend-webhook'
      group_wait: 10s
      repeat_interval: 1h
    
    # 安全告警 - 优先处理
    - match_re:
        alertname: '^(HighLoginFailureRate|AccountLocked|UnusualApiAccess)$'
      receiver: 'backend-webhook'
      group_wait: 10s
      repeat_interval: 30m
    
    # 警告级别告警
    - match:
        severity: warning
      receiver: 'backend-webhook'
      group_wait: 1m
      repeat_interval: 4h

# 告警抑制规则
inhibit_rules:
  # 严重告警抑制同源警告
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# 接收者配置
receivers:
  # 通过后端 API 发送告警通知
  # 后端会从数据库读取邮件配置，支持邮件、企业微信、钉钉等多种通知方式
  - name: 'backend-webhook'
    webhook_configs:
      - url: 'http://backend:8080/api/system/alert/webhook'
        send_resolved: true
        http_config:
          # 可选：添加认证头
          # authorization:
          #   type: Bearer
          #   credentials: 'your-internal-api-key'
