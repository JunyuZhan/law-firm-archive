# MinIO 分布式集群负载均衡配置

events {
    worker_connections 1024;
}

http {
    # MinIO API 后端
    upstream minio_api {
        least_conn;
        server minio1:9000 weight=1;
        server minio2:9000 weight=1;
        server minio3:9000 weight=1;
        server minio4:9000 weight=1;
    }

    # MinIO Console 后端
    upstream minio_console {
        least_conn;
        server minio1:9001 weight=1;
        server minio2:9001 weight=1;
        server minio3:9001 weight=1;
        server minio4:9001 weight=1;
    }

    # API 服务（端口 9000）
    server {
        listen 9000;
        server_name _;

        # 允许大文件上传
        client_max_body_size 500M;

        location / {
            proxy_pass http://minio_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            proxy_connect_timeout 300;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # Console 服务（端口 9001）
    server {
        listen 9001;
        server_name _;

        location / {
            proxy_pass http://minio_console;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

