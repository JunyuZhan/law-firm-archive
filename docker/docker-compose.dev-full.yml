# =====================================================
# 开发环境全量配置 (Development Environment - Full)
# =====================================================
# 使用方法: docker compose -f docker-compose.dev-full.yml up -d
# 或使用脚本: ./scripts/env-start.sh dev --full
# =====================================================
name: law-firm-dev-full

services:
  # ============================================
  # 基础设施 (继承自 docker-compose.yml)
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: law-firm-postgres
    environment:
      POSTGRES_DB: law_firm_dev
      POSTGRES_USER: law_admin
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ../scripts/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_admin -d law_firm_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-firm-network

  redis:
    image: redis:7-alpine
    container_name: law-firm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-firm-network

  minio:
    image: minio/minio:latest
    container_name: law-firm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - law-firm-network

  # MinIO 初始化 (自动创建 bucket)
  minio-init:
    image: minio/mc:latest
    container_name: law-firm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/law-firm --ignore-existing;
      exit 0;
      "
    networks:
      - law-firm-network

  # OnlyOffice 文档预览服务
  onlyoffice:
    build:
      context: ./onlyoffice
      dockerfile: Dockerfile
    image: law-onlyoffice:latest
    container_name: law-firm-onlyoffice
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=law-firm-onlyoffice-default-secret-2024
      - ALLOW_PRIVATE_IP_ADDRESS=true
    ports:
      - "8088:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - onlyoffice_dev_data:/var/www/onlyoffice/Data
      - onlyoffice_dev_logs:/var/log/onlyoffice
    networks:
      - law-firm-network

  # OCR 服务 (PaddleOCR)
  paddle-ocr:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    image: law-ocr:latest
    container_name: law-firm-ocr
    environment:
      - OCR_LANG=ch
    ports:
      - "8001:8000"
    networks:
      - law-firm-network

  # Elasticsearch (如需启用，取消注释以下内容)
  # elasticsearch:
  #   image: elasticsearch:8.11.1
  #   container_name: dev-elasticsearch
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #     - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - es_dev_data:/usr/share/elasticsearch/data
  #   networks:
  #     - law-dev-net

  # ============================================
  # 应用服务 (已移至宿主机运行，此处注释以供参考)
  # ============================================
  # backend:
  #   ... (保持注释)
  # frontend:
  #   ... (保持注释)

networks:
  law-firm-network:
    driver: bridge

volumes:
  postgres_dev_data:
  minio_dev_data:
  onlyoffice_dev_data:
  onlyoffice_dev_logs:
  es_dev_data:
