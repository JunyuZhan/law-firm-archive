# =====================================================
# NAS 存储方案 - MinIO 部署在 NAS 上
# =====================================================
# 架构:
#   应用服务器 (192.168.50.10)  →  NAS (192.168.50.20)
#   - Backend, Frontend              - MinIO (RAID5)
#   - PostgreSQL, Redis              - 数据库备份
#   - OnlyOffice, PaddleOCR
# =====================================================

version: '3.8'

services:
  # ===========================================
  # 前端服务
  # ===========================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: law-firm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - law-firm-network
    restart: always

  # ===========================================
  # 后端服务
  # ===========================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        - MAVEN_PROFILE=prod
    container_name: law-firm-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=law_firm
      - DB_USER=law_admin
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      # MinIO 指向 NAS
      - MINIO_ENDPOINT=http://${NAS_IP:-192.168.50.20}:9000
      - MINIO_EXTERNAL_ENDPOINT=http://${NAS_IP:-192.168.50.20}:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - OCR_SERVICE_URL=http://paddle-ocr:8000
      - ONLYOFFICE_URL=http://onlyoffice
    depends_on:
      - postgres
      - redis
    networks:
      - law-firm-network
    restart: always

  # ===========================================
  # 数据库（本地部署）
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: law-firm-postgres
    environment:
      - POSTGRES_DB=law_firm
      - POSTGRES_USER=law_admin
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - law-firm-network
    restart: always
    # 不暴露端口，仅内部访问

  # ===========================================
  # Redis 缓存
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: law-firm-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - law-firm-network
    restart: always

  # ===========================================
  # PaddleOCR 服务
  # ===========================================
  paddle-ocr:
    image: registry.baidubce.com/paddlepaddle/paddle:2.5.2
    container_name: law-firm-paddle-ocr
    command: >
      bash -c "pip install paddleocr flask -i https://pypi.tuna.tsinghua.edu.cn/simple &&
               python /app/ocr_server.py"
    volumes:
      - ../backend/src/main/resources/ocr_server.py:/app/ocr_server.py:ro
    networks:
      - law-firm-network
    restart: always

  # ===========================================
  # OnlyOffice 文档预览
  # ===========================================
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: law-firm-onlyoffice
    environment:
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
    networks:
      - law-firm-network
    restart: always

networks:
  law-firm-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  onlyoffice_data:

