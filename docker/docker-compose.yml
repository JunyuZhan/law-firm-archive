# 开发环境配置
name: law-firm-dev

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: law-firm-postgres
    environment:
      POSTGRES_DB: law_firm_dev
      POSTGRES_USER: law_admin
      POSTGRES_PASSWORD: dev_password_123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_admin -d law_firm_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-firm-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: law-firm-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-firm-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: law-firm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API端口
      - "9001:9001"   # 控制台端口
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - law-firm-network

  # MinIO 初始化（创建 bucket）
  minio-init:
    image: minio/mc:latest
    container_name: law-firm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/law-firm --ignore-existing;
      echo 'MinIO bucket law-firm 创建完成';
      exit 0;
      "
    networks:
      - law-firm-network

  # PaddleOCR服务（已停用，如需启用请取消注释）
  # paddle-ocr:
  #   build:
  #     context: ./ocr
  #     dockerfile: Dockerfile
  #   container_name: law-firm-ocr
  #   restart: unless-stopped
  #   environment:
  #     OCR_LANG: "ch"
  #     OCR_USE_GPU: "false"
  #     OCR_MAX_WORKERS: "4"
  #   ports:
  #     - "8001:8000"
  #   volumes:
  #     - ocr_models:/app/models
  #     - ocr_cache:/app/cache
  #   networks:
  #     - law-firm-network
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # OnlyOffice 文档预览服务（自定义镜像，包含中文字体）
  onlyoffice:
    build:
      context: ./onlyoffice
      dockerfile: Dockerfile
    image: law-onlyoffice:latest
    container_name: law-firm-onlyoffice
    restart: unless-stopped
    environment:
      - JWT_ENABLED=false
      # 允许访问私有 IP 地址（用于从后端代理获取文件）
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    ports:
      - "8088:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    networks:
      - law-firm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch 全文搜索（可选，后期启用）
  # elasticsearch:
  #   image: elasticsearch:8.11.1
  #   container_name: law-elasticsearch
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #     - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - elasticsearch_data:/usr/share/elasticsearch/data
  #   networks:
  #     - law-firm-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  ocr_models:
    driver: local
  ocr_cache:
    driver: local
  onlyoffice_data:
    driver: local
  onlyoffice_logs:
    driver: local
  # elasticsearch_data:
  #   driver: local

networks:
  law-firm-network:
    driver: bridge

