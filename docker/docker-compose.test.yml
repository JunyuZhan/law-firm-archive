# =====================================================
# 测试环境配置 (Test Environment)
# =====================================================
# 使用方法: docker compose -f docker-compose.test.yml up -d
# 或使用脚本: ./scripts/env-start.sh test
# =====================================================
name: law-firm-test

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: law-firm-test-postgres
    environment:
      POSTGRES_DB: law_firm_test
      POSTGRES_USER: law_admin
      POSTGRES_PASSWORD: test_password_123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # 使用不同端口避免冲突
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ../scripts/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_admin -d law_firm_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-firm-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: law-firm-test-redis
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"  # 使用不同端口避免冲突
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - law-firm-network

  # MinIO 对象存储
  minio:
    image: minio/minio:RELEASE.2024-07-15T19-02-30Z
    container_name: law-firm-test-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"   # API端口（避免冲突）
      - "9003:9001"   # 控制台端口（避免冲突）
    volumes:
      - minio_test_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - law-firm-network

  # MinIO 初始化（创建 bucket）
  minio-init:
    image: minio/mc:latest
    container_name: law-firm-test-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/law-firm-test --ignore-existing;
      echo 'MinIO bucket law-firm-test 创建完成';
      exit 0;
      "
    networks:
      - law-firm-network

  # OnlyOffice 文档预览服务（测试环境可选）
  onlyoffice:
    build:
      context: ./onlyoffice
      dockerfile: Dockerfile
    image: law-onlyoffice:latest
    container_name: law-firm-test-onlyoffice
    restart: unless-stopped
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-law-firm-test-onlyoffice-secret-2024}
      - JWT_HEADER=Authorization
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
      - DS_EXAMPLE_ENABLED=false
    ports:
      - "8089:80"  # 使用不同端口避免冲突
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - onlyoffice_test_data:/var/www/onlyoffice/Data
      - onlyoffice_test_logs:/var/log/onlyoffice
      - onlyoffice_test_cache:/var/www/onlyoffice/documentserver/.cache
    networks:
      - law-firm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_test_data:
    driver: local
  redis_test_data:
    driver: local
  minio_test_data:
    driver: local
  onlyoffice_test_data:
    driver: local
  onlyoffice_test_logs:
    driver: local
  onlyoffice_test_cache:
    driver: local

networks:
  law-firm-network:
    driver: bridge
