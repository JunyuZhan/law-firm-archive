# =====================================================
# 主从服务器部署配置 (Master-Slave Deployment)
# =====================================================
# 使用方法（从项目根目录运行）:
#   主服务器: docker compose --env-file .env -f docker/docker-compose.master-slave.yml --profile master up -d
#   从服务器: docker compose --env-file .env -f docker/docker-compose.master-slave.yml --profile slave up -d
#
# ⚠️ 注意：环境配置统一使用项目根目录的 .env 文件
#
# ⚠️ 注意：
#   1. 主服务器和从服务器需要分别部署
#   2. 先部署主服务器，再部署从服务器
#   3. 确保两台服务器在同一网络，可以互相访问
# =====================================================
name: law-firm-master-slave

services:
  # ============================================
  # 前端服务（主从服务器都运行）
  # ============================================
  frontend:
    build:
      context: ../frontend
      dockerfile: scripts/deploy/Dockerfile
      args:
        - DOCS_USERNAME=${DOCS_USERNAME:-admin}
        - DOCS_PASSWORD=${DOCS_PASSWORD:-lawfirm@2026}
    container_name: law-firm-frontend-${NODE_ROLE:-master}
    labels:
      - "com.law-firm.group=core"
      - "com.law-firm.service=frontend"
      - "com.law-firm.role=${NODE_ROLE:-master}"
    ports:
      - "80:8080"   # HTTP
      - "443:8443"  # HTTPS
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    environment:
      - API_HOST=backend
      - API_PORT=8080
    depends_on:
      - backend
    networks:
      - law-firm-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # 后端服务（主从服务器都运行）
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.prod
    container_name: law-firm-backend-${NODE_ROLE:-master}
    labels:
      - "com.law-firm.group=core"
      - "com.law-firm.service=backend"
      - "com.law-firm.role=${NODE_ROLE:-master}"
    environment:
      - TZ=UTC
      # 数据库配置：主服务器连接主库，从服务器连接从库
      # 注意：主服务器使用 postgres-master，从服务器使用 postgres-slave
      - DB_HOST=${DB_HOST:-postgres-${NODE_ROLE:-master}}
      - DB_PORT=5432
      - DB_NAME=law_firm
      - DB_USERNAME=law_admin
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      # Redis 配置：主服务器连接主库，从服务器连接从库
      # 注意：主服务器使用 redis-master，从服务器使用 redis-slave
      - REDIS_HOST=${REDIS_HOST:-redis-${NODE_ROLE:-master}}
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      # MinIO 配置（分布式模式）
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=law-firm
      - MINIO_BROWSER_ENDPOINT=${MINIO_BROWSER_ENDPOINT:-}
      - OCR_SERVICE_URL=http://paddle-ocr:8000
      - SPRING_PROFILES_ACTIVE=prod
      - SWAGGER_ENABLED=false
      # OnlyOffice 配置
      - ONLYOFFICE_JWT_ENABLED=${ONLYOFFICE_JWT_ENABLED:-true}
      - ONLYOFFICE_JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-law-firm-onlyoffice-default-secret-2024}
      - ONLYOFFICE_CALLBACK_URL=http://backend:8080/api
      - ONLYOFFICE_URL=${ONLYOFFICE_URL:-/onlyoffice}
      - FILE_SERVER_URL=http://minio:9000
    # 注意：depends_on 需要根据 profile 动态设置
    # 主服务器依赖 postgres-master 和 redis-master
    # 从服务器依赖 postgres-slave 和 redis-slave
    # 由于 Docker Compose 的限制，我们需要同时声明两个依赖，但使用 required: false
    # 实际运行时，只有对应 profile 的服务会被启动
    depends_on:
      postgres-master:
        condition: service_healthy
        required: false
      postgres-slave:
        condition: service_healthy
        required: false
      redis-master:
        condition: service_healthy
        required: false
      redis-slave:
        condition: service_healthy
        required: false
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G

  # ============================================
  # PostgreSQL 主库（仅主服务器）
  # ============================================
  postgres-master:
    profiles: ["master"]
    image: postgres:15-alpine
    container_name: law-firm-postgres-master
    labels:
      - "com.law-firm.group=infrastructure"
      - "com.law-firm.service=postgres"
      - "com.law-firm.role=master"
    environment:
      POSTGRES_DB: law_firm
      POSTGRES_USER: law_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      # 主从复制配置
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicator_password}
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ../scripts/init-db:/docker-entrypoint-initdb.d:ro
      # PostgreSQL 主从复制配置
      - ./postgres/master/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/master/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=3"
      - "-c"
      - "max_replication_slots=3"
    ports:
      - "5432:5432"  # 允许从服务器连接
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_admin -d law_firm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PostgreSQL 从库（仅从服务器）
  # ============================================
  postgres-slave:
    profiles: ["slave"]
    image: postgres:15-alpine
    container_name: law-firm-postgres-slave
    labels:
      - "com.law-firm.group=infrastructure"
      - "com.law-firm.service=postgres"
      - "com.law-firm.role=slave"
    environment:
      POSTGRES_DB: law_firm
      POSTGRES_USER: law_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      # 主从复制配置
      POSTGRES_MASTER_HOST: ${POSTGRES_MASTER_HOST:-192.168.50.10}
      POSTGRES_MASTER_PORT: ${POSTGRES_MASTER_PORT:-5432}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicator_password}
    volumes:
      - postgres_slave_data:/var/lib/postgresql/data
      # PostgreSQL 从库配置
      - ./postgres/slave/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hot_standby=on"
      # PostgreSQL 15 使用 primary_conninfo 而不是 recovery.conf
      - "-c"
      - "primary_conninfo=host=${POSTGRES_MASTER_HOST:-192.168.50.10} port=${POSTGRES_MASTER_PORT:-5432} user=${POSTGRES_REPLICATION_USER:-replicator} password=${POSTGRES_REPLICATION_PASSWORD:-replicator_password}"
      - "-c"
      - "primary_slot_name="
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_admin -d law_firm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 主从服务器都使用 postgres 作为服务名（通过 profiles 区分）
  # 注意：实际使用时，主服务器使用 postgres-master，从服务器使用 postgres-slave
  # 这里为了兼容性，提供一个别名服务

  # ============================================
  # Redis 主库（仅主服务器）
  # ============================================
  redis-master:
    profiles: ["master"]
    image: redis:7-alpine
    container_name: law-firm-redis-master
    labels:
      - "com.law-firm.group=cache"
      - "com.law-firm.service=redis"
      - "com.law-firm.role=master"
    command: >
      redis-server
      --appendonly yes
      --masterauth ${REDIS_PASSWORD:-}
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_master_data:/data
    ports:
      - "6379:6379"  # 允许从服务器连接
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis 从库（仅从服务器）
  # ============================================
  redis-slave:
    profiles: ["slave"]
    image: redis:7-alpine
    container_name: law-firm-redis-slave
    labels:
      - "com.law-firm.group=cache"
      - "com.law-firm.service=redis"
      - "com.law-firm.role=slave"
    command: >
      redis-server
      --appendonly yes
      --slaveof ${REDIS_MASTER_HOST:-192.168.50.10} ${REDIS_MASTER_PORT:-6379}
      --masterauth ${REDIS_PASSWORD:-}
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_slave_data:/data
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 主从服务器都使用 redis 作为服务名（通过 profiles 区分）
  # 注意：实际使用时，主服务器使用 redis-master，从服务器使用 redis-slave
  # 这里为了兼容性，提供一个别名服务

  # ============================================
  # MinIO 分布式模式（主从服务器各运行一个节点）
  # ============================================
  minio:
    image: minio/minio:${MINIO_VERSION:-RELEASE.2024-07-15T19-02-30Z}
    container_name: law-firm-minio-${NODE_ROLE:-master}
    labels:
      - "com.law-firm.group=storage"
      - "com.law-firm.service=minio"
      - "com.law-firm.role=${NODE_ROLE:-master}"
    # MinIO 分布式模式：2节点配置
    # 注意：MinIO 分布式模式需要两个节点同时运行
    # 主服务器和从服务器各运行一个 MinIO 节点，组成分布式集群
    # 主服务器: http://192.168.50.10:9000/data
    # 从服务器: http://192.168.50.11:9000/data
    # 启动命令需要包含两个节点的地址
    command: >
      server
      --console-address ":9001"
      http://${MINIO_NODE1_HOST:-192.168.50.10}:9000/data
      http://${MINIO_NODE2_HOST:-192.168.50.11}:9000/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      TZ: UTC
    volumes:
      - minio_${NODE_ROLE:-master}_data:/data
    ports:
      - "9000:9000"  # API 端口（分布式模式需要）
      - "9001:9001"  # 控制台端口
    networks:
      - law-firm-network
    restart: unless-stopped

  minio-init:
    image: minio/mc:${MINIO_MC_VERSION:-latest}
    container_name: law-firm-minio-init-${NODE_ROLE:-master}
    labels:
      - "com.law-firm.group=storage"
      - "com.law-firm.service=minio-init"
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb local/law-firm --ignore-existing;
      mc anonymous set public local/law-firm;
      exit 0;
      "
    depends_on:
      - minio
    networks:
      - law-firm-network
    profiles: ["master"]  # 仅在主服务器初始化

volumes:
  postgres_master_data:
  postgres_slave_data:
  redis_master_data:
  redis_slave_data:
  minio_master_data:
  minio_slave_data:

networks:
  law-firm-network:
    driver: bridge
