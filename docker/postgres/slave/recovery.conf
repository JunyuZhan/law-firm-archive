# PostgreSQL 从库恢复配置
# 此文件会被挂载到容器的数据目录
#
# ⚠️ 注意：此文件仅为模板，实际部署时应使用环境变量配置
# 请参考 docker-compose.master-slave.yml 中的配置方式

# 主库连接信息
# ⚠️ 生产环境请勿在此文件中硬编码密码！
# 推荐方式：使用 docker-compose.master-slave.yml 中的环境变量配置
# primary_conninfo = 'host=<主库IP> port=5432 user=replicator password=<从环境变量获取>'

# 以下为示例配置（仅供参考，请勿在生产环境使用）
# primary_conninfo = 'host=192.168.50.10 port=5432 user=replicator password=<请配置环境变量 POSTGRES_REPLICATION_PASSWORD>'

# 启用热备模式
standby_mode = on

# 复制槽名称（可选，用于防止主库删除未复制的 WAL）
# primary_slot_name = 'replication_slot'
