# =====================================================
# MinIO 分布式集群配置
# =====================================================
# 适用于多服务器部署，提供数据冗余和高可用
# 最小配置：4 个驱动器（可跨 2-4 台服务器）
# =====================================================

version: '3.8'

services:
  # ===========================================
  # MinIO 节点 1（部署在服务器 1）
  # ===========================================
  minio1:
    image: minio/minio:RELEASE.2024-07-15T19-02-30Z
    container_name: law-firm-minio1
    hostname: minio1
    command: server --console-address ":9001" http://minio{1...4}/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio1_data:/data
    networks:
      - law-firm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  # ===========================================
  # MinIO 节点 2（部署在服务器 2）
  # ===========================================
  minio2:
    image: minio/minio:RELEASE.2024-07-15T19-02-30Z
    container_name: law-firm-minio2
    hostname: minio2
    command: server --console-address ":9001" http://minio{1...4}/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio2_data:/data
    networks:
      - law-firm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  # ===========================================
  # MinIO 节点 3（部署在服务器 3 或服务器 1）
  # ===========================================
  minio3:
    image: minio/minio:RELEASE.2024-07-15T19-02-30Z
    container_name: law-firm-minio3
    hostname: minio3
    command: server --console-address ":9001" http://minio{1...4}/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio3_data:/data
    networks:
      - law-firm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  # ===========================================
  # MinIO 节点 4（部署在服务器 4 或服务器 2）
  # ===========================================
  minio4:
    image: minio/minio:RELEASE.2024-07-15T19-02-30Z
    container_name: law-firm-minio4
    hostname: minio4
    command: server --console-address ":9001" http://minio{1...4}/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio4_data:/data
    networks:
      - law-firm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  # ===========================================
  # MinIO 负载均衡（Nginx）
  # ===========================================
  minio-lb:
    image: nginx:alpine
    container_name: law-firm-minio-lb
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - ./nginx-minio.conf:/etc/nginx/nginx.conf:ro
    networks:
      - law-firm-network
    depends_on:
      - minio1
      - minio2
      - minio3
      - minio4
    restart: always

networks:
  law-firm-network:
    driver: overlay
    attachable: true

volumes:
  minio1_data:
    driver: local
  minio2_data:
    driver: local
  minio3_data:
    driver: local
  minio4_data:
    driver: local

