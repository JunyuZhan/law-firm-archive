# 生产环境部署配置
# 使用方法：docker compose --env-file ../.env -f docker-compose.prod.yml up -d
# 
# 注意：环境变量配置文件在项目根目录 .env

# 项目名称，所有容器、网络、数据卷都会以此为前缀
name: law-firm

services:
  # ============================================
  # 前端服务（Nginx + Vue3 静态文件）
  # ============================================
  frontend:
    build:
      context: ../frontend
      dockerfile: scripts/deploy/Dockerfile
      args:
        - DOCS_USERNAME=${DOCS_USERNAME:-admin}
        - DOCS_PASSWORD=${DOCS_PASSWORD:-lawfirm@2026}
    container_name: law-firm-frontend
    ports:
      - "80:8080"
    environment:
      - API_HOST=backend
      - API_PORT=8080
    depends_on:
      - backend
    networks:
      - law-firm-network
    restart: unless-stopped

  # ============================================
  # 后端服务（Spring Boot）
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: law-firm-backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=law_firm
      - DB_USERNAME=law_admin
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=law-firm
      - OCR_SERVICE_URL=http://paddle-ocr:8000
      - SPRING_PROFILES_ACTIVE=prod
      - SWAGGER_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - law-firm-network
    restart: unless-stopped

  # ============================================
  # 基础设施服务（继承开发环境配置）
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: law-firm-postgres
    environment:
      POSTGRES_DB: law_firm
      POSTGRES_USER: law_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_admin -d law_firm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: law-firm-redis
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: law-firm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"  # 控制台（可选暴露）
    networks:
      - law-firm-network
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: law-firm-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb local/law-firm --ignore-existing;
      exit 0;
      "
    networks:
      - law-firm-network

  # paddle-ocr 服务已停用，如需启用请取消注释
  # paddle-ocr:
  #   build:
  #     context: ./ocr
  #     dockerfile: Dockerfile
  #   container_name: law-firm-ocr
  #   environment:
  #     OCR_LANG: "ch"
  #     OCR_USE_GPU: "false"
  #     OCR_MAX_WORKERS: "4"
  #   volumes:
  #     - ocr_models:/app/models
  #     - ocr_cache:/app/cache
  #   networks:
  #     - law-firm-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  onlyoffice:
    build:
      context: ./onlyoffice
      dockerfile: Dockerfile
    image: law-firm-onlyoffice:latest
    container_name: law-firm-onlyoffice
    environment:
      # 启用 JWT 验证，防止配置篡改
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-your-onlyoffice-jwt-secret-change-in-production}
      - JWT_HEADER=Authorization
      # 允许私有 IP 地址（用于 Docker 网络）
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
      - DS_EXAMPLE_ENABLED=false
    ports:
      - "8088:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_cache:/var/www/onlyoffice/documentserver/.cache
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ocr_models:
  ocr_cache:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_cache:

networks:
  law-firm-network:
    driver: bridge

