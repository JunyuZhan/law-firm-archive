# =====================================================
# 生产环境配置 (Production Environment)
# =====================================================
# 使用方法: 从项目根目录运行（推荐）:
#   docker compose --env-file .env -f docker/docker-compose.prod.yml up -d
#
# ⚠️ 注意：环境配置统一使用项目根目录的 .env 文件
# =====================================================
name: law-firm

services:
  # ============================================
  # law-firm 核心应用服务（必需）
  # ============================================
  # 前端服务（Nginx + Vue3 静态文件）
  frontend:
    build:
      context: ../frontend
      dockerfile: scripts/deploy/Dockerfile
      args:
        - DOCS_USERNAME=${DOCS_USERNAME:-admin}
        - DOCS_PASSWORD=${DOCS_PASSWORD:-lawfirm@2026}
    container_name: law-firm-frontend
    labels:
      - "com.law-firm.group=core"
      - "com.law-firm.service=frontend"
    ports:
      - "80:8080"   # HTTP
      - "443:8443"  # HTTPS
    volumes:
      # SSL 证书挂载
      - ./ssl:/etc/nginx/ssl:ro
      # 可选：如果需要使用自定义的 nginx SSL 配置，取消下面的注释
      # - ../frontend/scripts/deploy/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
    environment:
      - API_HOST=backend
      - API_PORT=8080
    depends_on:
      - backend
    networks:
      - law-firm-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # 后端服务（Spring Boot）
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.prod
    container_name: law-firm-backend
    labels:
      - "com.law-firm.group=core"
      - "com.law-firm.service=backend"
    environment:
      - TZ=UTC
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=law_firm
      - DB_USERNAME=law_admin
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - REDIS_HOST=law-firm-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      # MinIO 配置（项目专用，密码从 .env 文件读取）
      # ⚠️ 注意：使用 Docker Compose 服务名（minio），而不是容器名（law-firm-minio）
      # 后端服务通过 Docker 内部网络直接访问 MinIO，不需要通过 Nginx 代理
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_EXTERNAL_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=law-firm
      - MINIO_BROWSER_ENDPOINT=${MINIO_BROWSER_ENDPOINT:-}
      - OCR_SERVICE_URL=http://paddle-ocr:8000
      - SPRING_PROFILES_ACTIVE=prod
      - SWAGGER_ENABLED=false
      # OnlyOffice 配置（必须与容器保持一致）
      - ONLYOFFICE_JWT_ENABLED=${ONLYOFFICE_JWT_ENABLED:-true}
      - ONLYOFFICE_JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-law-firm-onlyoffice-default-secret-2024}
      - ONLYOFFICE_CALLBACK_URL=http://backend:8080/api
      - ONLYOFFICE_URL=${ONLYOFFICE_URL:-/onlyoffice}
      - FILE_SERVER_URL=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G

  # ============================================
  # law-firm 基础设施服务（必需）
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: law-firm-postgres
    labels:
      - "com.law-firm.group=infrastructure"
      - "com.law-firm.service=postgres"
    environment:
      POSTGRES_DB: law_firm
      POSTGRES_USER: law_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_admin -d law_firm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # law-firm 缓存服务（必需）
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: law-firm-redis
    labels:
      - "com.law-firm.group=cache"
      - "com.law-firm.service=redis"
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # law-firm 存储服务（必需）
  # ============================================
  minio:
    # MinIO GUI 最后完整版（RELEASE.2024-07-15T19-02-30Z）
    image: minio/minio:${MINIO_VERSION:-RELEASE.2024-07-15T19-02-30Z}
    container_name: law-firm-minio
    labels:
      - "com.law-firm.group=storage"
      - "com.law-firm.service=minio"
    command: server /data --console-address ":9001"
    environment:
      # 密码从 .env 文件读取，首次部署时自动生成
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      TZ: UTC
    volumes:
      - minio_data:/data
    # 端口映射已移除，通过 Nginx 路径代理访问：
    # - /minio/ → MinIO API (9000)
    # - /minio-console/ → MinIO Console (9001)
    # ports:
    #   - "9000:9000"  # API 端口（浏览器访问缩略图需要）
    #   - "9001:9001"  # 控制台
    networks:
      - law-firm-network
    restart: unless-stopped

  minio-init:
    image: minio/mc:${MINIO_MC_VERSION:-latest}
    container_name: law-firm-minio-init
    labels:
      - "com.law-firm.group=storage"
      - "com.law-firm.service=minio-init"
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      # 使用 Docker Compose 服务名（minio），密码从环境变量读取
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb local/law-firm --ignore-existing;
      mc anonymous set public local/law-firm;
      exit 0;
      "
    depends_on:
      - minio
    networks:
      - law-firm-network

  # paddle-ocr 服务已停用，如需启用请取消注释
  # paddle-ocr:
  #   build:
  #     context: ./ocr
  #     dockerfile: Dockerfile
  #   container_name: law-firm-ocr
  #   environment:
  #     OCR_LANG: "ch"
  #     OCR_USE_GPU: "false"
  #     OCR_MAX_WORKERS: "4"
  #   volumes:
  #     - ocr_models:/app/models
  #     - ocr_cache:/app/cache
  #   networks:
  #     - law-firm-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # ============================================
  # law-firm 文档服务（可选，可通过 --profile docs 启用）
  # ============================================
  onlyoffice:
    profiles: ["docs"]  # 使用 --profile docs 启用文档服务
    build:
      context: ./onlyoffice
      dockerfile: Dockerfile
    image: law-firm-onlyoffice:latest
    container_name: law-firm-onlyoffice
    labels:
      - "com.law-firm.group=docs"
      - "com.law-firm.service=onlyoffice"
    environment:
      # 必须启用 JWT，否则后端请求会被拒绝
      - JWT_ENABLED=${ONLYOFFICE_JWT_ENABLED:-true}
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-law-firm-onlyoffice-default-secret-2024}
      - JWT_HEADER=Authorization
      # 关键：允许 JWT 在请求体中传递（解决 convert 请求验证失败问题）
      - JWT_IN_BODY=true
      # 允许私有 IP 地址（用于 Docker 网络）
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
      - DS_EXAMPLE_ENABLED=false
      - TZ=UTC
    # 端口映射已移除，通过 Nginx 路径代理访问：/onlyoffice/
    # ports:
    #   - "8088:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_cache:/var/www/onlyoffice/documentserver/.cache
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # law-firm 监控服务（可选，可通过 --profile monitoring 启用）
  # ============================================
  prometheus:
    profiles: ["monitoring"]  # 使用 --profile monitoring 启用监控服务
    image: prom/prometheus:latest
    container_name: law-firm-prometheus
    labels:
      - "com.law-firm.group=monitoring"
      - "com.law-firm.service=prometheus"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.external-url=/prometheus/'  # 配置子路径访问
    # 端口映射已移除，通过 Nginx 路径代理访问：/prometheus/
    # ports:
    #   - "9090:9090"
    networks:
      - law-firm-network
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]  # 使用 --profile monitoring 启用监控服务
    image: grafana/grafana:latest
    container_name: law-firm-grafana
    labels:
      - "com.law-firm.group=monitoring"
      - "com.law-firm.service=grafana"
    # 端口映射已移除，通过 Nginx 路径代理访问：/grafana/
    # ports:
    #   - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      # 使用默认密码 admin（可共享，便于统一管理）
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DEFAULT_LANGUAGE=zh-Hans
      - GF_SERVER_ROOT_URL=/grafana/  # 配置子路径访问
      - GF_SERVER_SERVE_FROM_SUB_PATH=true  # 启用子路径模式
    networks:
      - law-firm-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ocr_models:
  ocr_cache:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_cache:
  prometheus_data:
  grafana_data:

networks:
  law-firm-network:
    driver: bridge

