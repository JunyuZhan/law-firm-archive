# 生产环境部署配置
# 使用方法：docker compose -f docker-compose.prod.yml up -d
# 
# 注意：需要先配置 ../.env 文件

services:
  # ============================================
  # 前端服务（Nginx + Vue3 静态文件）
  # ============================================
  frontend:
    build:
      context: ../frontend
      dockerfile: scripts/deploy/Dockerfile
    container_name: law-firm-frontend
    ports:
      - "80:8080"
    environment:
      - API_HOST=backend
      - API_PORT=8080
    depends_on:
      - backend
    networks:
      - law-firm-network
    restart: unless-stopped

  # ============================================
  # 后端服务（Spring Boot）
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: law-firm-backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=law_firm
      - DB_USERNAME=law_admin
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=law-firm
      - OCR_SERVICE_URL=http://paddle-ocr:8000
      - SPRING_PROFILES_ACTIVE=prod
      - SWAGGER_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - law-firm-network
    restart: unless-stopped

  # ============================================
  # 基础设施服务（继承开发环境配置）
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: law-firm-postgres
    environment:
      POSTGRES_DB: law_firm
      POSTGRES_USER: law_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_admin -d law_firm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: law-firm-redis
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - law-firm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: law-firm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"  # 控制台（可选暴露）
    networks:
      - law-firm-network
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: law-firm-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb local/law-firm --ignore-existing;
      exit 0;
      "
    networks:
      - law-firm-network

  # paddle-ocr:
  #   build:
  #     context: ./ocr
  #     dockerfile: Dockerfile
  #   container_name: law-firm-ocr
  #   environment:
  #     OCR_LANG: "ch"
  #     OCR_USE_GPU: "false"
  #   volumes:
  #     - ocr_models:/app/models
  #   networks:
  #     - law-firm-network
  #   restart: unless-stopped

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: law-firm-onlyoffice
    environment:
      - JWT_ENABLED=false
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
    networks:
      - law-firm-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  # ocr_models:
  onlyoffice_data:

networks:
  law-firm-network:
    driver: bridge

