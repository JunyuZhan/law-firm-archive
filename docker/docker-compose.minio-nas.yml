# =====================================================
# MinIO on NAS - 部署在 NAS 上的 MinIO 服务
# =====================================================
# 在 NAS 上运行此配置（如群晖 Docker）
# NAS 需要配置 RAID5/RAID6 提供磁盘冗余
# =====================================================

version: '3.8'

services:
  minio:
    image: minio/minio:RELEASE.2024-07-15T19-02-30Z
    container_name: law-firm-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      # NAS RAID 卷路径（根据实际 NAS 配置修改）
      # 群晖: /volume1/docker/minio
      # 威联通: /share/Container/minio
      - /volume1/docker/law-firm/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  # MinIO 初始化（创建 bucket）
  minio-init:
    image: minio/mc:latest
    container_name: law-firm-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing myminio/law-firm;
      mc anonymous set download myminio/law-firm/public;
      echo 'MinIO bucket created successfully';
      exit 0;
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}

