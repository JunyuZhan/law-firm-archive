# =====================================================
# 律师事务所管理系统 - Docker Swarm 分布式部署配置
# =====================================================
# 使用方法：
#   1. 初始化 Swarm: docker swarm init
#   2. 添加工作节点: docker swarm join --token <token> <manager-ip>:2377
#   3. 部署: docker stack deploy -c docker-compose.swarm.yml law-firm
# =====================================================

version: '3.8'

services:
  # ============================================
  # 前端服务（可水平扩展）
  # ============================================
  frontend:
    image: ${REGISTRY:-}law-firm-frontend:${VERSION:-latest}
    build:
      context: ../frontend
      dockerfile: scripts/deploy/Dockerfile
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    ports:
      - "80:8080"
    environment:
      - API_HOST=backend
      - API_PORT=8080
    networks:
      - law-firm-network
    depends_on:
      - backend

  # ============================================
  # 后端服务（可水平扩展）
  # ============================================
  backend:
    image: ${REGISTRY:-}law-firm-backend:${VERSION:-latest}
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=law_firm
      - DB_USERNAME=law_admin
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=law-firm
      - OCR_SERVICE_URL=http://paddle-ocr:8000
      - SPRING_PROFILES_ACTIVE=prod
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-false}
      # OnlyOffice 配置（与 OnlyOffice 容器保持一致）
      - ONLYOFFICE_JWT_ENABLED=${ONLYOFFICE_JWT_ENABLED:-true}
      - ONLYOFFICE_JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-your-onlyoffice-jwt-secret-change-in-production}
      - ONLYOFFICE_URL=${ONLYOFFICE_URL:-http://localhost/onlyoffice}
      - ONLYOFFICE_CALLBACK_URL=http://frontend:8080/api
      - FILE_SERVER_URL=http://minio:9000
    networks:
      - law-firm-network
    depends_on:
      - postgres
      - redis

  # ============================================
  # PostgreSQL 数据库（主节点）
  # ============================================
  postgres:
    image: postgres:15-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1'
          memory: 1024M
    environment:
      POSTGRES_DB: law_firm
      POSTGRES_USER: law_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - law-firm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_admin -d law_firm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - law-firm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MinIO 对象存储
  # ============================================
  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - law-firm-network

  # ============================================
  # OCR 服务
  # ============================================
  paddle-ocr:
    image: ${REGISTRY:-}law-firm-ocr:${VERSION:-latest}
    build:
      context: ./ocr
      dockerfile: Dockerfile
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '2'
          memory: 2048M
    environment:
      OCR_LANG: "ch"
      OCR_USE_GPU: "false"
    volumes:
      - ocr_models:/app/models
    networks:
      - law-firm-network

  # ============================================
  # OnlyOffice 文档预览
  # ============================================
  onlyoffice:
    image: ${REGISTRY:-}law-firm-onlyoffice:${VERSION:-latest}
    build:
      context: ./onlyoffice
      dockerfile: Dockerfile
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '2'
          memory: 2048M
    ports:
      - "8088:80"
    environment:
      # 启用 JWT 验证，防止配置篡改
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-your-onlyoffice-jwt-secret-change-in-production}
      - JWT_HEADER=Authorization
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
      - DS_EXAMPLE_ENABLED=false
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_cache:/var/www/onlyoffice/documentserver/.cache
    networks:
      - law-firm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ============================================
# 数据卷（持久化存储）
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  ocr_models:
    driver: local
  onlyoffice_data:
    driver: local
  onlyoffice_logs:
    driver: local
  onlyoffice_cache:
    driver: local

# ============================================
# 网络配置
# ============================================
networks:
  law-firm-network:
    driver: overlay
    attachable: true

