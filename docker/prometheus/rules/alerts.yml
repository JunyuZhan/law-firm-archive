# Prometheus 告警规则
# 智慧律所管理系统告警配置

groups:
  # ==================== 应用级告警 ====================
  - name: application
    rules:
      # 服务不可用
      - alert: ServiceDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "后端服务不可用"
          description: "后端服务 {{ $labels.instance }} 已宕机超过 1 分钟"

      # 高错误率
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) 
          / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 错误率过高"
          description: "5xx 错误率超过 5%，当前值: {{ $value | humanizePercentage }}"

      # 响应时间过长
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, 
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 响应时间过长"
          description: "95% 请求响应时间超过 2 秒，当前值: {{ $value | humanizeDuration }}"

      # JVM 内存使用率过高
      - alert: HighJvmMemoryUsage
        expr: |
          jvm_memory_used_bytes{area="heap"} 
          / jvm_memory_max_bytes{area="heap"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM 堆内存使用率过高"
          description: "JVM 堆内存使用率超过 90%，当前值: {{ $value | humanizePercentage }}"

      # 线程池拒绝
      - alert: ThreadPoolRejections
        expr: increase(executor_rejected_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "线程池任务被拒绝"
          description: "线程池 {{ $labels.name }} 有任务被拒绝，可能存在过载"

  # ==================== 安全告警 ====================
  - name: security
    rules:
      # 异常登录失败
      - alert: HighLoginFailureRate
        expr: |
          sum(increase(login_failure_total[15m])) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "登录失败次数异常"
          description: "15 分钟内登录失败超过 50 次，可能存在暴力破解攻击"

      # 账户锁定
      - alert: AccountLocked
        expr: increase(account_locked_total[1h]) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "账户锁定次数异常"
          description: "1 小时内有 {{ $value }} 个账户被锁定"

      # 异常 API 访问
      - alert: UnusualApiAccess
        expr: |
          sum(rate(http_server_requests_seconds_count{uri=~"/api/admin.*"}[5m])) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "管理接口访问频率异常"
          description: "管理接口访问频率过高，可能存在异常行为"

  # ==================== 数据库告警 ====================
  - name: database
    rules:
      # PostgreSQL 连接数过高
      - alert: HighDatabaseConnections
        expr: |
          pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接数过高"
          description: "PostgreSQL 活跃连接数超过 80，当前值: {{ $value }}"

      # 数据库响应慢
      - alert: SlowDatabaseQueries
        expr: |
          pg_stat_activity_max_tx_duration > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "存在慢查询"
          description: "存在执行时间超过 60 秒的数据库事务"

      # HikariCP 连接池等待
      - alert: HikariPoolWaiting
        expr: hikaricp_connections_pending > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接池等待过多"
          description: "等待获取数据库连接的请求数: {{ $value }}"

  # ==================== Redis 告警 ====================
  - name: redis
    rules:
      # Redis 内存使用率过高
      - alert: HighRedisMemoryUsage
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率过高"
          description: "Redis 内存使用率超过 90%"

      # Redis 连接数过高
      - alert: HighRedisConnections
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 连接数过高"
          description: "Redis 客户端连接数: {{ $value }}"

  # ==================== 存储告警 ====================
  - name: storage
    rules:
      # MinIO 存储空间不足
      - alert: LowDiskSpace
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} 
           / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "磁盘空间不足"
          description: "根分区剩余空间不足 10%"

      # MinIO 服务不可用
      - alert: MinioDown
        expr: up{job="minio"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MinIO 服务不可用"
          description: "MinIO 对象存储服务已宕机"

  # ==================== 基础设施告警 ====================
  - name: infrastructure
    rules:
      # CPU 使用率过高
      - alert: HighCpuUsage
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "CPU 使用率超过 80%，当前值: {{ $value | humanize }}%"

      # 内存使用率过高
      - alert: HighMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) 
          / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "内存使用率超过 90%"

      # 容器重启
      - alert: ContainerRestarting
        expr: |
          increase(container_restart_count[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器频繁重启"
          description: "容器 {{ $labels.name }} 在 1 小时内重启超过 3 次"
