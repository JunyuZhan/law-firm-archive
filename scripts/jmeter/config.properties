# JMeter 压力测试配置文件
# 律师事务所管理系统

# ========== 服务器配置 ==========
server.host=localhost
server.port=8080
server.protocol=http
server.api.prefix=/api

# ========== 测试账号 ==========
# 管理员账号（用于登录测试）
test.admin.username=admin
test.admin.password=admin123

# 普通用户账号（用于业务测试）
test.user.username=lawyer1
test.user.password=lawyer123

# ========== 并发配置 ==========
# 登录测试
threads.login=100
rampup.login=30
duration.login=300

# 查询测试
threads.query=50
rampup.query=20
duration.query=300

# 写入测试
threads.write=20
rampup.write=10
duration.write=300

# 综合测试
threads.full=100
rampup.full=60
duration.full=600

# ========== 思考时间 ==========
# 模拟用户操作间隔（毫秒）
think.time.min=500
think.time.max=2000

# ========== 超时配置 ==========
connect.timeout=30000
response.timeout=60000

# ========== 测试数据 ==========
# 客户ID范围（用于随机查询）
client.id.min=1
client.id.max=100

# 项目ID范围
matter.id.min=1
matter.id.max=50

# ========== 性能指标阈值 ==========
# 响应时间阈值（毫秒）
threshold.p50=100
threshold.p95=500
threshold.p99=1000

# 错误率阈值（百分比）
threshold.error.rate=0.1

# TPS 阈值
threshold.tps.login=100
threshold.tps.query=200
threshold.tps.write=50
