# 生产环境配置
# 注意：敏感信息应通过环境变量注入，不要在此文件中硬编码

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  # 数据源配置 - 必须通过环境变量配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:law_firm}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0

# JWT配置 - 必须设置强密钥
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET:law-firm}

# OCR服务配置
ocr:
  service-url: ${OCR_SERVICE_URL:http://localhost:8000}
  timeout: 30000

# 日志配置 - 生产环境降低日志级别
logging:
  level:
    com.lawfirm: info
    org.springframework.security: warn
    org.mybatis: warn
  file:
    name: /var/log/law-firm/app.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

# API文档 - 生产环境可关闭
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

