# 生产环境配置
# 使用方式: --spring.profiles.active=prod

# 数据库配置（必须通过环境变量配置）
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  
  # RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET:archives}
  proxy-prefix: ${MINIO_PROXY_PREFIX:/storage}

# JWT配置（必须通过环境变量配置）
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# 生产环境禁用Swagger/OpenAPI文档
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

knife4j:
  enable: false

# 生产环境日志级别
logging:
  level:
    root: WARN
    com.archivesystem: INFO
    org.springframework.security: WARN
  # 生产环境不输出SQL
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 安全配置
security:
  crypto:
    secret: ${SECURITY_CRYPTO_SECRET}
    legacy-secret: ${SECURITY_CRYPTO_LEGACY_SECRET:${JWT_SECRET:}}
  trusted-proxies: ${TRUSTED_PROXIES:127.0.0.1,::1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  registry-upgrade:
    running-backend-digest: ${RUNNING_BACKEND_DIGEST:}
    running-frontend-digest: ${RUNNING_FRONTEND_DIGEST:}
    default-registry-base-url: ${REGISTRY_DEFAULT_BASE_URL:https://hub.albertzhan.top}
    default-backend-repository: ${REGISTRY_BACKEND_REPOSITORY:law-firm-archive/backend}
    default-frontend-repository: ${REGISTRY_FRONTEND_REPOSITORY:law-firm-archive/frontend}
    registry-username: ${REGISTRY_USERNAME:}
    registry-password: ${REGISTRY_PASSWORD:}
  dist-center:
    latest-json-url: ${DIST_CENTER_LATEST_JSON_URL:}
