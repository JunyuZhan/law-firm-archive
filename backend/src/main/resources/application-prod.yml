# 生产环境配置
# 注意：敏感信息应通过环境变量注入，不要在此文件中硬编码

server:
  port: 8080
  servlet:
    context-path: /api
  # Tomcat连接超时配置（支持大文件下载和长时间操作）
  tomcat:
    connection-timeout: 600000  # 连接超时10分钟（600秒）
    keep-alive-timeout: 600000  # Keep-Alive超时10分钟
    max-keep-alive-requests: 1000  # 最大Keep-Alive请求数

spring:
  # 数据源配置 - 必须通过环境变量配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:law_firm}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0

# JWT配置 - 必须设置强密钥
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  external-endpoint: ${MINIO_EXTERNAL_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET:law-firm}

# OCR服务配置
ocr:
  # 生产环境使用PaddleOCR服务
  provider: paddle
  paddle:
    url: ${OCR_SERVICE_URL:http://paddle-ocr:8000}
    # OCR 服务 API Key（必须设置）
    api-key: ${OCR_API_KEY:}
  timeout: 30000

# OnlyOffice 配置 - 生产环境
# 通过前端 Nginx 代理访问 OnlyOffice（/onlyoffice/ -> onlyoffice:80）
# ONLYOFFICE_URL 格式：http://你的域名或IP/onlyoffice
onlyoffice:
  document-server-url: ${ONLYOFFICE_URL:http://localhost/onlyoffice}
  callback-url: ${ONLYOFFICE_CALLBACK_URL:http://backend:8080/api}
  file-server-url: ${FILE_SERVER_URL:http://minio:9000}
  # 生产环境必须启用 JWT
  jwt-enabled: ${ONLYOFFICE_JWT_ENABLED:true}
  jwt-secret: ${ONLYOFFICE_JWT_SECRET:law-firm-onlyoffice-default-secret-2024}

# 日志配置 - 生产环境降低日志级别
logging:
  level:
    com.lawfirm: info
    org.springframework.security: warn
    org.mybatis: warn
  file:
    name: /var/log/law-firm/app.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

# API文档 - 生产环境可关闭
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

