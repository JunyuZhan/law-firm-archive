# 应用版本配置（用于版本检查和升级提示）
app:
  version: 1.0.0
  version-check:
    # 自定义版本检查 URL（可选）
    url: ${APP_VERSION_CHECK_URL:}
    # GitHub 仓库（可选，格式: owner/repo）
    github-repo: ${APP_VERSION_GITHUB_REPO:junyuzhan/law-firm}

server:
  port: 8080
  servlet:
    context-path: /api
  # Tomcat连接超时配置（支持大文件下载和长时间操作）
  tomcat:
    connection-timeout: 600000  # 连接超时10分钟（600秒）
    keep-alive-timeout: 600000  # Keep-Alive超时10分钟
    max-keep-alive-requests: 1000  # 最大Keep-Alive请求数

spring:
  application:
    name: law-firm-management
  profiles:
    active: dev

  # 数据源配置
  # ⚠️ 安全警告：生产环境必须通过环境变量 DB_PASSWORD 设置强密码
  # 默认值仅用于开发环境，生产环境使用默认值存在严重安全风险！
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:law_firm_dev}
    username: ${DB_USERNAME:law_admin}
    password: ${DB_PASSWORD:dev_password_123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

  # 文件上传
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lawfirm.domain
  type-handlers-package: com.lawfirm.infrastructure.persistence.typehandler
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT配置
# ⚠️ 安全警告：生产环境必须通过环境变量 JWT_SECRET 设置强随机密钥（至少256位）
# 生成密钥命令: openssl rand -base64 32
# 默认值仅用于开发环境，生产环境使用默认值存在严重安全风险！
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天
  header: Authorization
  prefix: Bearer

# MinIO配置
# ⚠️ 安全警告：生产环境必须通过环境变量 MINIO_ACCESS_KEY 和 MINIO_SECRET_KEY 设置强密钥
# 默认值 minioadmin/minioadmin 是 MinIO 的默认值，存在严重安全风险！
# 生产环境必须修改 MinIO 默认密钥
minio:
  endpoint: http://localhost:9000
  # 外部访问地址（Docker 容器如 OnlyOffice 访问 MinIO 时使用）
  # 使用 Docker 内部服务名，确保容器间可互相访问
  external-endpoint: ${MINIO_EXTERNAL_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: law-firm
  presigned-url:
    preview-expiry: ${MINIO_PRESIGNED_PREVIEW_EXPIRY:300}
    download-expiry: ${MINIO_PRESIGNED_DOWNLOAD_EXPIRY:3600}
    edit-expiry: ${MINIO_PRESIGNED_EDIT_EXPIRY:14400}

# OCR服务配置 (PaddleOCR 3.x / PP-OCRv5)
# 官方仓库: https://github.com/PaddlePaddle/PaddleOCR
ocr:
  # provider: mock (模拟返回，用于测试) | paddle (启用真实OCR，使用 PP-OCRv5)
  # PP-OCRv5 特性: 单模型支持简体中文、繁体中文、英文、日文、拼音，准确率提升13%
  # 暂时使用 mock 模式，启用真实 OCR 时设置环境变量 OCR_PROVIDER=paddle
  provider: ${OCR_PROVIDER:mock}
  paddle:
    # Docker 端口映射: 主机 8001 -> 容器 8000，本地开发使用 8001
    url: ${OCR_SERVICE_URL:http://localhost:8001}
  timeout: 120000  # OCR识别超时时间（毫秒），默认120秒（首次识别或大图片可能需要更长时间）

# 质量检查配置
quality:
  check:
    # 合格阈值（百分比），默认80%
    pass-threshold: ${QUALITY_PASS_THRESHOLD:80}
    # 是否要求所有项目都通过才算合格，默认true
    require-all-pass: ${QUALITY_REQUIRE_ALL_PASS:true}

# OnlyOffice 文档服务配置
onlyoffice:
  # OnlyOffice Document Server 地址
  # 开发环境使用相对路径 /onlyoffice，通过 Vite 代理访问
  # 生产环境通过 ONLYOFFICE_URL 环境变量设置（如 http://192.168.50.10/onlyoffice）
  document-server-url: ${ONLYOFFICE_URL:/onlyoffice}
  # 后端服务地址（OnlyOffice 回调和获取文件时使用）
  # 重要：必须使用 Docker 内部服务名（backend:8080），不能使用 host.docker.internal（Linux 不支持）
  callback-url: ${ONLYOFFICE_CALLBACK_URL:http://backend:8080/api}
  # 文件服务地址（OnlyOffice 获取文件时使用）
  # 重要：必须使用 Docker 内部服务名（minio:9000）
  file-server-url: ${FILE_SERVER_URL:http://minio:9000}
  # JWT 密钥（生产环境请通过环境变量 ONLYOFFICE_JWT_SECRET 设置）
  jwt-secret: ${ONLYOFFICE_JWT_SECRET:law-firm-onlyoffice-default-secret-2024}
  # 是否启用 JWT（生产环境必须启用）
  jwt-enabled: ${ONLYOFFICE_JWT_ENABLED:true}

# 日志配置
logging:
  level:
    com.lawfirm: debug
    org.springframework.security: info
    org.mybatis: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# API文档配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: 智慧律所管理系统API
    description: Law Firm Management System RESTful API
    version: 1.0.0
    contact:
      name: 技术支持
      email: support@lawfirm.com

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
    loggers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

# 业务配置
law-firm:
  # 备份配置
  backup:
    path: ${BACKUP_PATH:./backups}  # 备份文件存储路径
    docker-container: ${BACKUP_DOCKER_CONTAINER:}  # Docker 容器名称（可选，未配置时自动检测）
    restore-timeout-minutes: ${BACKUP_RESTORE_TIMEOUT_MINUTES:60}  # 恢复操作超时时间（分钟），默认60分钟
  # 提成配置
  commission:
    default-firm-retention-rate: 0.30  # 默认律所留存比例30%
    default-originator-rate: 0.20      # 默认案源提成比例20%
    salaried-originator-commission: false  # 授薪律师是否获得案源提成
  # 审批配置
  approval:
    conflict-check-approvers: TEAM_LEADER,DIRECTOR  # 利冲审批角色
    contract-amount-threshold: 100000  # 合同金额审批阈值
  # 文件配置
  file:
    allowed-types: pdf,doc,docx,xls,xlsx,ppt,pptx,jpg,jpeg,png,gif,txt,zip,rar
    max-size-mb: 100
  # 文档访问 Token 配置
  document:
    # 文档访问 Token 密钥（生产环境必须通过环境变量设置强密钥！）
    token-secret: ${DOCUMENT_TOKEN_SECRET:law-firm-document-access-dev-only}
  # 性能监控配置
  performance:
    slow-api-threshold: 3000    # 慢接口告警阈值（毫秒）
    warn-api-threshold: 1000    # 性能警告阈值（毫秒）

# 客户服务系统回调安全配置
# 用于验证来自客户服务系统的回调请求（访问日志、下载日志等）
client-service:
  callback:
    # 是否启用 IP 白名单验证（生产环境建议启用）
    ip-whitelist-enabled: ${CLIENT_SERVICE_IP_WHITELIST_ENABLED:true}
    # 客户服务系统的 IP 白名单（多个 IP 用逗号分隔，支持 CIDR 格式）
    # 示例: 192.168.1.100,192.168.2.0/24,10.0.0.0/8
    # 开发环境可设置为 127.0.0.1,localhost 或禁用白名单验证
    ip-whitelist: ${CLIENT_SERVICE_IP_WHITELIST:127.0.0.1,localhost}
    # 回调 API Key（当客户服务系统没有固定公网IP时，使用此密钥替代 IP 白名单验证）
    # 需要与客户服务系统配置的 callback.api-key 一致
    # 使用方式：禁用 ip-whitelist-enabled 后，配置此密钥
    api-key: ${CLIENT_SERVICE_CALLBACK_API_KEY:}
