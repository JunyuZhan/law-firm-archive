# ============================================================================
# 默认运行配置
# ============================================================================
# 目标：支持 Docker 内“单端口极简部署”开箱即用。
# - 容器内依赖直接使用固定主机名：postgres / redis / rabbitmq / elasticsearch / minio
# - 业务参数优先从 sys_config 读取；本文件仅保留代码级兜底值
# - 生产环境如需覆盖，仍可启用 application-prod.yml
# ============================================================================

server:
  port: 8090
  servlet:
    context-path: /api

spring:
  application:
    name: archive-system
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB
  
  # 数据源配置（默认指向 Docker 网络内的 PostgreSQL）
  datasource:
    url: jdbc:postgresql://postgres:5432/archive_system
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  
  # Redis配置（默认指向 Docker 网络内的 Redis）
  data:
    redis:
      host: redis
      port: 6379
      password: ""
      database: 1
  
  # RabbitMQ配置（默认指向 Docker 网络内的 RabbitMQ）
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:archive}
    password: ${SPRING_RABBITMQ_PASSWORD:changeme}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
          multiplier: 2
  
  # Elasticsearch配置
  elasticsearch:
    uris: http://elasticsearch:9200
    connection-timeout: 5s
    socket-timeout: 30s
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# Actuator健康检查与监控配置
management:
  endpoints:
    web:
      exposure:
        # 只暴露必要的端点
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      # 只有认证用户才能查看详细信息
      show-details: when-authorized
      # 隐藏敏感组件信息
      show-components: when-authorized
    prometheus:
      enabled: true
    # 禁用可能泄露敏感信息的端点
    env:
      enabled: false
    configprops:
      enabled: false
    beans:
      enabled: false
    mappings:
      enabled: false
    threaddump:
      enabled: false
    heapdump:
      enabled: false
  health:
    db:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  # 启用安全审计
  info:
    env:
      enabled: false
    git:
      enabled: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.archivesystem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# MinIO配置（默认指向 Docker 网络内的 MinIO）
minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_ACCESS_KEY:archive}
  secret-key: ${MINIO_SECRET_KEY:changeme}
  bucket-name: archive-system
  proxy-prefix: /storage

# JWT配置
jwt:
  secret:
  expiration: 7200000
  refresh-expiration: 259200000

# 安全配置
security:
  crypto:
    secret:
    legacy-secret:
  cors:
    allowed-origins: http://localhost:3001,http://localhost:3000
  trusted-proxies: 127.0.0.1,::1
  api-key:
    enabled: true
    header: X-API-Key

# 镜像仓库更新检查（与「规则与运行参数」页 system.upgrade.* 一致；摘要比对用环境变量注入）
app:
  registry-upgrade:
    running-backend-digest:
    running-frontend-digest:
    default-registry-base-url: https://hub.albertzhan.top
    default-backend-repository: law-firm-archive/backend
    default-frontend-repository: law-firm-archive/frontend
    registry-username:
    registry-password:
  dist-center:
    # 与 Dist Center 对齐：拉取 versions/latest.json，比对 env.APP_VERSION 与当前实例 APP_VERSION
    latest-json-url: ${DIST_CENTER_LATEST_JSON_URL:}

# 档案系统配置
# 注意：以下业务配置已迁移到数据库 sys_config 表，可在后台「规则与运行参数」页面管理
# - 文件上传限制 (system.upload.max.size, system.upload.allowed.types)
# - 借阅参数 (system.borrow.*)
# - 水印设置 (system.watermark.*)
# - 安全策略 (system.password.*, system.login.*)
# - 通知设置 (system.notify.*)
# - 邮件 SMTP (system.mail.smtp.*, system.mail.from)
# - 档案号规则 (archive.no.*)
# - 保管期限 (retention.*)

# 可选：通过环境变量启用告警收件人（与库中 system.notify.* 合并；SMTP 可在控制台配置）
# alert.email.enabled=false
# alert.email.from=
# alert.email.to=

# Knife4j配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    com.archivesystem: debug
    org.springframework.security: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"
