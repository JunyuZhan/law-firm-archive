# ============================================================================
# 开发环境配置文件
# ============================================================================
# ⚠️ 安全警告：
# 本文件包含开发环境的默认密码和密钥，仅用于本地开发测试！
# 
# 🔴 生产环境部署时必须：
#   1. 使用 --spring.profiles.active=prod 启动
#   2. 通过环境变量配置所有敏感信息（参见 application-prod.yml）
#   3. 切勿将生产密码提交到代码仓库
# ============================================================================

server:
  port: 8090
  servlet:
    context-path: /api

spring:
  application:
    name: archive-system
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB
  
  # 数据源配置（⚠️ 仅开发环境使用默认值）
  datasource:
    url: jdbc:postgresql://localhost:5433/archive_system
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}  # 开发环境请通过环境变量或 IDE 启动配置注入
    driver-class-name: org.postgresql.Driver
  
  # Redis配置（⚠️ 仅开发环境使用默认值）
  data:
    redis:
      host: localhost
      port: 6380
      password: ""  # ⚠️ 生产环境必须使用环境变量 REDIS_PASSWORD
      database: 1
  
  # RabbitMQ配置（⚠️ 仅开发环境使用默认值）
  rabbitmq:
    host: localhost
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:admin}
    password: ${SPRING_RABBITMQ_PASSWORD:}  # 开发环境请通过环境变量或 IDE 启动配置注入
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
          multiplier: 2
  
  # Elasticsearch配置
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 30s
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# Actuator健康检查与监控配置
management:
  endpoints:
    web:
      exposure:
        # 只暴露必要的端点
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      # 只有认证用户才能查看详细信息
      show-details: when-authorized
      # 隐藏敏感组件信息
      show-components: when-authorized
    prometheus:
      enabled: true
    # 禁用可能泄露敏感信息的端点
    env:
      enabled: false
    configprops:
      enabled: false
    beans:
      enabled: false
    mappings:
      enabled: false
    threaddump:
      enabled: false
    heapdump:
      enabled: false
  health:
    db:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  # 启用安全审计
  info:
    env:
      enabled: false
    git:
      enabled: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.archivesystem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# MinIO配置（⚠️ 仅开发环境使用默认值）
minio:
  endpoint: http://localhost:9002
  access-key: ${MINIO_ACCESS_KEY:}  # 开发环境请通过环境变量或 IDE 启动配置注入
  secret-key: ${MINIO_SECRET_KEY:}  # 开发环境请通过环境变量或 IDE 启动配置注入
  bucket-name: archive-system

# JWT配置（⚠️ 生产环境必须配置强密钥）
jwt:
  secret: ${JWT_SECRET:}  # 开发环境请通过环境变量或 IDE 启动配置注入
  # ⚠️ Token 过期时间：开发环境较长便于调试，生产环境建议缩短
  expiration: ${JWT_EXPIRATION:7200000}      # Access Token 过期时间，默认2小时（生产环境建议1-2小时）
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:259200000}  # Refresh Token 过期时间，默认3天（生产环境建议1-3天）

# 安全配置
security:
  crypto:
    secret: ${SECURITY_CRYPTO_SECRET:}  # 开发环境请通过环境变量或 IDE 启动配置注入
    legacy-secret: ${SECURITY_CRYPTO_LEGACY_SECRET:${JWT_SECRET:}}  # 老环境迁移期可继续解密旧密文
  # CORS允许的来源（生产环境请配置具体域名）
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001,http://localhost:3000}
  # 仅当请求来自这些受信代理时，才解析 X-Forwarded-For / X-Real-IP
  trusted-proxies: ${TRUSTED_PROXIES:127.0.0.1,::1}
  # API Key配置（通过后台"来源管理"配置）
  api-key:
    enabled: ${API_KEY_ENABLED:true}
    header: X-API-Key

# 镜像仓库更新检查（与「规则与运行参数」页 system.upgrade.* 一致；摘要比对用环境变量注入）
app:
  registry-upgrade:
    running-backend-digest: ${RUNNING_BACKEND_DIGEST:}
    running-frontend-digest: ${RUNNING_FRONTEND_DIGEST:}
    default-registry-base-url: https://hub.albertzhan.top
    default-backend-repository: law-firm-archive/backend
    default-frontend-repository: law-firm-archive/frontend
    registry-username: ${REGISTRY_USERNAME:}
    registry-password: ${REGISTRY_PASSWORD:}

# 档案系统配置
# 注意：以下业务配置已迁移到数据库 sys_config 表，可在后台「规则与运行参数」页面管理
# - 文件上传限制 (system.upload.max.size, system.upload.allowed.types)
# - 借阅参数 (system.borrow.*)
# - 水印设置 (system.watermark.*)
# - 安全策略 (system.password.*, system.login.*)
# - 通知设置 (system.notify.*)
# - 邮件 SMTP (system.mail.smtp.*, system.mail.from)
# - 档案号规则 (archive.no.*)
# - 保管期限 (retention.*)

# 可选：通过环境变量启用告警收件人（与库中 system.notify.* 合并；SMTP 可在控制台配置）
# alert.email.enabled=false
# alert.email.from=
# alert.email.to=

# Knife4j配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    com.archivesystem: debug
    org.springframework.security: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"
