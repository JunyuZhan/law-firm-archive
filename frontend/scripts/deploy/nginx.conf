worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  # Gzip 压缩
  gzip on;
  gzip_buffers 32 16k;
  gzip_comp_level 6;
  gzip_min_length 1k;
  gzip_static on;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/x-javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript;
  gzip_vary on;

  server {
    listen 8080;
    server_name _;

    # Service Worker - 禁止缓存，每次检查更新
    location = /sw.js {
      root /usr/share/nginx/html;
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
    }

    # PWA manifest - 禁止缓存
    location = /manifest.webmanifest {
      root /usr/share/nginx/html;
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Content-Type "application/manifest+json";
    }

    # 文档站点（优先匹配）
    location = /docs {
      return 301 /docs/;
    }

    location /docs/ {
      alias /usr/share/nginx/html/docs/;
      try_files $uri $uri/ /docs/index.html;
      index index.html;

      # 缓存静态资源
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
      }
    }

    # 主前端静态文件
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      index index.html;

      # 缓存静态资源
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
      }
    }

    # API 反向代理
    location /api/ {
      # 代理到同一 Docker 网络中的 backend 服务
      proxy_pass http://backend:8080/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "keep-alive";
      
      # 超时设置（增加以支持 AI 生成等长时间操作）
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      
      # 禁用代理缓冲，避免长响应被截断
      proxy_buffering off;
      
      # 文件上传大小限制
      client_max_body_size 100M;
    }

    # OnlyOffice 缓存文件代理（Editor.bin 等转换后的文件）
    location /cache/ {
      proxy_pass http://onlyoffice:80/cache/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # 禁用缓冲，确保大文件完整传输
      proxy_buffering off;
      proxy_request_buffering off;
      
      # 超时设置
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
    }

    # MinIO 对象存储代理
    location /minio/ {
      proxy_pass http://minio:9000/;
      # 关键：保持 MinIO 期望的 Host，否则预签名验证会失败
      proxy_set_header Host minio:9000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # 禁用缓冲，支持大文件
      proxy_buffering off;
      proxy_request_buffering off;
      
      # 超时设置
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      
      # 文件大小限制
      client_max_body_size 500M;
    }

    # MinIO Console 管理界面代理
    location /minio-console/ {
      # 重写 URL：移除 /minio-console/ 前缀后转发给 MinIO Console
      rewrite ^/minio-console/(.*)$ /$1 break;
      proxy_pass http://minio:9001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # 关键：设置 X-Forwarded-Host 包含子路径，告诉 MinIO Console 它在子路径下运行
      # 这样 MinIO Console 会生成正确的相对路径资源 URL 和 WebSocket 连接
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Prefix /minio-console;
      
      # WebSocket 支持（Console 需要 WebSocket）
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      # 超时设置
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      
      # 启用缓冲以支持 sub_filter（动态替换响应内容）
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
      proxy_busy_buffers_size 8k;
      
      # 动态替换响应中的 URL，将根路径资源改为 /minio-console/ 前缀
      sub_filter_types text/html text/css text/javascript application/javascript application/json;
      sub_filter 'href="/' 'href="/minio-console/';
      sub_filter 'src="/' 'src="/minio-console/';
      sub_filter 'action="/' 'action="/minio-console/';
      sub_filter 'url("/' 'url("/minio-console/';
      sub_filter 'url(\'/' 'url(\'/minio-console/';
      sub_filter_once off;
      
      # 文件大小限制
      client_max_body_size 100M;
    }

    # OnlyOffice 文档编辑服务代理
    # ============================================
    # 解决内网部署 + 公网域名访问的跨域和混合内容问题
    # ============================================
    location /onlyoffice/ {
      proxy_pass http://onlyoffice:80/;
      
      # 关键：正确传递外部访问信息给 OnlyOffice
      # Host 必须是外部域名（不是内网地址）
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # 关键：传递协议（HTTP/HTTPS），解决 Mixed Content 问题
      proxy_set_header X-Forwarded-Proto $scheme;
      # 关键：传递外部主机名（不包含子路径）
      proxy_set_header X-Forwarded-Host $host;
      # 关键：传递子路径前缀，让 OnlyOffice 知道它运行在 /onlyoffice/ 下
      proxy_set_header X-Forwarded-Prefix /onlyoffice;
      # 关键：传递完整的外部 URL 基础路径
      proxy_set_header X-Forwarded-Uri $request_uri;
      # 传递 Authorization header（OnlyOffice JWT 验证需要）
      proxy_set_header Authorization $http_authorization;
      
      # CORS 头（解决跨域问题）
      # 注意：如果需要严格安全，可以将 * 替换为具体域名
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE, PATCH" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
      add_header Access-Control-Allow-Credentials true always;
      add_header Access-Control-Expose-Headers "Content-Disposition, Content-Length" always;
      
      # 处理 OPTIONS 预检请求
      if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Max-Age 86400;
        add_header Content-Type 'text/plain charset=UTF-8';
        add_header Content-Length 0;
        return 204;
      }
      
      # WebSocket 支持（OnlyOffice 实时协作需要）
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      # 关键：禁用缓冲，避免 WebSocket 问题
      proxy_buffering off;
      proxy_request_buffering off;
      
      # 超时设置（编辑大文件需要更长时间）
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      
      # 文件大小限制
      client_max_body_size 100M;
    }

    # Prometheus 监控服务代理（可选，通过 --profile monitoring 启用）
    # ⚠️ 安全：需要 Basic Auth 认证
    location /prometheus/ {
      # Basic Auth 认证（密码文件需要提前生成）
      # 生成命令: htpasswd -c /etc/nginx/.htpasswd admin
      auth_basic "Prometheus Monitoring";
      auth_basic_user_file /etc/nginx/.htpasswd;
      
      # 关键：不要移除路径前缀（末尾不要斜杠），Prometheus 需要完整路径来生成正确的内部链接
      proxy_pass http://law-firm-prometheus:9090;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # 关键：设置 X-Forwarded-Host，告诉 Prometheus 它的外部访问地址
      proxy_set_header X-Forwarded-Host $http_host;
      
      # 超时设置
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
    }

    # Grafana 可视化服务代理（可选，通过 --profile monitoring 启用）
    location /grafana/ {
      # 关键：不要移除路径前缀（末尾不要斜杠），Grafana 需要完整路径来生成正确的内部链接
      proxy_pass http://law-firm-grafana:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # 关键：设置 X-Forwarded-Host，告诉 Grafana 它的外部访问地址
      proxy_set_header X-Forwarded-Host $http_host;
      
      # WebSocket 支持
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      # 超时设置
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
      root /usr/share/nginx/html;
    }
  }
}
