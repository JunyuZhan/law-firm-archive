      proxy_read_timeout 600s;
      
      # 禁用代理缓冲，避免长响应被截断
      proxy_buffering off;
      
      # 文件上传大小限制
      client_max_body_size 100M;
    }

    # MinIO 对象存储代理（解决 HTTPS 页面加载 HTTP 资源问题）
    location /minio/ {
