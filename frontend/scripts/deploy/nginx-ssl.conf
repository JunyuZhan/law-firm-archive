worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  # Gzip 压缩
  gzip on;
  gzip_buffers 32 16k;
  gzip_comp_level 6;
  gzip_min_length 1k;
  gzip_static on;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/x-javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript;
  gzip_vary on;

  # HTTP 服务器 - 同时支持HTTP（容器内部通信）和重定向（外部访问）
  server {
    listen 8080;
    server_name _;

    # Service Worker - 禁止缓存，每次检查更新
    location = /sw.js {
      root /usr/share/nginx/html;
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
    }

    # PWA manifest - 禁止缓存
    location = /manifest.webmanifest {
      root /usr/share/nginx/html;
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Content-Type "application/manifest+json";
    }
    
    # 文档站点（优先匹配）
    location = /docs {
      return 301 /docs/;
    }

    location /docs/ {
      alias /usr/share/nginx/html/docs/;
      try_files $uri $uri/ /docs/index.html;
      index index.html;

      # 缓存静态资源
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
      }
    }

    # 主前端静态文件
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      index index.html;

      # 缓存静态资源
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
      }
    }

    # API 反向代理
    location /api/ {
      # 代理到同一 Docker 网络中的 backend 服务
      proxy_pass http://backend:8080/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "keep-alive";
      
      # 超时设置（增加以支持 AI 生成等长时间操作）
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      
      # 禁用代理缓冲，避免长响应被截断
      proxy_buffering off;
      
      # 文件上传大小限制
      client_max_body_size 100M;
    }

    # MinIO 对象存储代理（解决 HTTPS 页面加载 HTTP 资源问题）
    location /minio/ {
      proxy_pass http://minio:9000/;
      # 关键：保持 MinIO 期望的 Host，否则预签名验证会失败
      proxy_set_header Host minio:9000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # 禁用缓冲，支持大文件
      proxy_buffering off;
      proxy_request_buffering off;
      
      # 超时设置
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      
      # 文件大小限制
      client_max_body_size 500M;
    }

    # OnlyOffice 缓存文件代理（Editor.bin 等转换后的文件）
    location /cache/ {
      proxy_pass http://onlyoffice:80/cache/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # 禁用缓冲，确保大文件完整传输
      proxy_buffering off;
      proxy_request_buffering off;
      
      # 超时设置
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
    }

    # OnlyOffice 文档编辑服务代理
    location /onlyoffice/ {
      proxy_pass http://onlyoffice:80/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      # 关键：传递 Authorization header（OnlyOffice JWT 验证需要）
      proxy_set_header Authorization $http_authorization;
      
      # CORS 头（解决跨域问题）
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
      add_header Access-Control-Allow-Credentials true always;
      
      # 处理 OPTIONS 预检请求
      if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Max-Age 1728000;
        add_header Content-Type 'text/plain charset=UTF-8';
        add_header Content-Length 0;
        return 204;
      }
      
      # WebSocket 支持（OnlyOffice 实时协作需要）
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      # 超时设置
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      
      # 文件大小限制
      client_max_body_size 100M;
    }

    # CA 证书下载（方便用户导入，通过HTTP访问）
    location /ssl/ca.crt {
      alias /etc/nginx/ssl/ca.crt;
      default_type application/x-x509-ca-cert;
      add_header Content-Disposition 'attachment; filename="law-firm-ca.crt"';
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
      root /usr/share/nginx/html;
    }
  }

  # HTTPS 服务器
  server {
    listen 8443 ssl http2;
    server_name _;

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 安全配置（推荐）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Service Worker - 禁止缓存，每次检查更新
    location = /sw.js {
      root /usr/share/nginx/html;
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
