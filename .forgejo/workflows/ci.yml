name: Archive CI

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Maven Mirror
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.m2"
          cat > "$HOME/.m2/settings.xml" <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <mirror>
                <id>aliyun-public</id>
                <mirrorOf>central</mirrorOf>
                <name>Aliyun Maven Mirror</name>
                <url>https://maven.aliyun.com/repository/public</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Backend Tests
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/backend"
          mvn -B -ntp test

      - name: Frontend Build
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/frontend"
          npm ci --no-fund --no-audit
          npm run build

      - name: Validate Compose And Release Scripts
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file docker/.env.example -f docker/docker-compose.yml config >/dev/null
          docker compose --env-file docker/.env.registry.example -f docker/docker-compose.registry.yml config >/dev/null
          bash -n scripts/build-and-push-on-linux.sh
          bash -n scripts/pull-from-registry.sh
          bash -n scripts/release/sync-dist-center.sh
          bash -n scripts/release/update-dist-version.sh
